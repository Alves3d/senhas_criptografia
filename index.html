<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#040409">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>NFC Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#040409;--bg2:#0b0b16;--bg3:#13132a;--card:#0f0f22;
  --border:rgba(120,120,255,.11);--border2:rgba(130,130,255,.24);
  --accent:#5b5ef7;--accent-h:#7b7ef9;--glow:rgba(91,94,247,.22);
  --green:#2dd4bf;--red:#f87171;--yellow:#fbbf24;
  --text:#dde0ff;--text2:#8890bb;--text3:#444470;
  --mono:'JetBrains Mono',monospace;--sans:'Outfit',sans-serif;
}
body{font-family:var(--sans);color:var(--text);min-height:100dvh;max-width:480px;margin:0 auto;overflow-x:hidden;
  background:radial-gradient(ellipse 60% 40% at 15% 0%,rgba(91,94,247,.10) 0%,transparent 60%),
  radial-gradient(ellipse 50% 30% at 85% 100%,rgba(45,212,191,.06) 0%,transparent 60%),var(--bg);}
.screen{min-height:100dvh;display:flex;flex-direction:column;padding-bottom:80px}
.hdr{padding:48px 24px 28px;text-align:center}
.hdr-icon{font-size:48px;display:block;margin-bottom:10px;filter:drop-shadow(0 0 16px rgba(91,94,247,.5))}
.hdr-title{font-size:26px;font-weight:700;letter-spacing:-.5px}
.hdr-sub{font-size:13px;color:var(--text2);margin-top:4px}
.tbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;
  border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(4,4,9,.92);
  backdrop-filter:blur(12px);z-index:20}
.tbar-title{font-size:16px;font-weight:600}
.tbar-side{display:flex;gap:6px;width:72px}.tbar-side:last-child{justify-content:flex-end}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px 20px;margin:0 14px 10px}
.card h3{font-size:15px;font-weight:600;margin-bottom:7px}
.card p{font-size:13px;line-height:1.55;color:var(--text2)}
.btn{display:block;width:100%;padding:13px 18px;border-radius:12px;font-family:var(--sans);font-size:14px;
  font-weight:600;border:none;cursor:pointer;transition:all .15s;margin-top:8px;text-align:center;}
.btn-p{background:var(--accent);color:#fff;box-shadow:0 0 20px var(--glow)}
.btn-p:hover{background:var(--accent-h)}.btn-p:active{transform:scale(.98)}
.btn-o{background:transparent;color:var(--accent-h);border:1px solid var(--border2)}.btn-o:hover{background:var(--glow)}
.btn-g{background:#0d3a2e;color:var(--green);border:1px solid rgba(45,212,191,.25)}
.btn-r{background:#3a0d0d;color:var(--red);border:1px solid rgba(248,113,113,.25)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}
.btn-txt{background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;font-family:var(--sans);
  text-decoration:underline;padding:6px 2px}
.ibtn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:10px;
  width:40px;height:40px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:17px;transition:background .15s;flex-shrink:0;color:var(--text)}
.ibtn:hover{background:rgba(255,255,255,.15)}
.ibtn-sm{background:none;border:none;cursor:pointer;padding:4px 5px;border-radius:7px;font-size:16px;
  transition:background .15s;line-height:1}
.ibtn-sm:hover{background:var(--bg3)}
.ig{display:flex;flex-direction:column;gap:6px;margin-bottom:2px}
.ig label{font-size:12px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.ig input,.ig select,.ig textarea{background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:11px 13px;color:var(--text);font-family:var(--sans);font-size:14px;
  outline:none;transition:border-color .15s;width:100%}
.ig input:focus,.ig select:focus,.ig textarea:focus{border-color:var(--accent)}
.ig textarea{resize:vertical;min-height:72px}
.ig select{appearance:none;cursor:pointer}
.mono-in{font-family:var(--mono)!important;font-size:13px!important;letter-spacing:.5px}
.pwd-row{display:flex;gap:6px;align-items:center}.pwd-row input{flex:1}
.steps{display:flex;flex-direction:column;gap:8px;padding:0 14px;margin-bottom:4px}
.step{display:flex;align-items:flex-start;gap:11px;background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:13px 15px;font-size:13px;line-height:1.5;color:var(--text2)}
.step strong{color:var(--text)}
.step-n{background:var(--accent);color:#fff;width:21px;height:21px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.key-box{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;
  padding:12px 14px;font-family:var(--mono);font-size:11px;color:var(--green);
  word-break:break-all;line-height:1.7;margin:10px 0 6px;letter-spacing:.5px;user-select:all;cursor:text}
.key-box.sm{font-size:10px}
.div-or{text-align:center;color:var(--text3);font-size:12px;margin:8px 0;position:relative}
.div-or::before,.div-or::after{content:'';position:absolute;top:50%;width:35%;height:1px;background:var(--border)}
.div-or::before{left:5%}.div-or::after{right:5%}
.nfc-card{text-align:center;padding:24px 20px}
.nfc-ico{font-size:56px;display:block;margin-bottom:10px;line-height:1}
.nfc-ico.pulse{animation:nfc 1.6s ease-in-out infinite}
@keyframes nfc{0%,100%{transform:scale(1);filter:drop-shadow(0 0 0px rgba(91,94,247,0))}
  50%{transform:scale(1.14);filter:drop-shadow(0 0 18px rgba(91,94,247,.9))}}
.tabs{display:flex;gap:7px;padding:10px 14px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 14px;
  font-family:var(--sans);font-size:13px;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s;}
.tab.on{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 0 12px var(--glow)}
.elist{display:flex;flex-direction:column;gap:9px;padding:0 14px;flex:1}
.ecard{background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:13px 15px;cursor:pointer;transition:border-color .15s,transform .1s}
.ecard:hover{border-color:var(--border2)}.ecard:active{transform:scale(.99)}
.ehdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.elabel{font-size:15px;font-weight:600}
.ebadge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.5px}
.euser{font-size:12px;color:var(--text2);margin-bottom:7px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.epwdr{display:flex;justify-content:space-between;align-items:center;gap:8px}
.epwd{font-family:var(--mono);font-size:13px;color:var(--text2);letter-spacing:1px;
  flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.eacts{display:flex;gap:1px;flex-shrink:0}
.fbody{padding:18px 14px;display:flex;flex-direction:column;gap:13px}
.btn-row{display:flex;gap:8px}.btn-row .btn{flex:1}
.fab{position:fixed;bottom:24px;right:20px;width:54px;height:54px;border-radius:50%;
  background:var(--accent);color:#fff;font-size:28px;border:none;cursor:pointer;
  box-shadow:0 4px 20px var(--glow);display:flex;align-items:center;justify-content:center;
  transition:all .15s;z-index:100;line-height:1}
.fab:hover{transform:scale(1.06)}.fab:active{transform:scale(.95)}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);
  background:var(--bg3);color:var(--text);padding:9px 18px;border-radius:24px;font-size:13px;
  font-weight:500;border:1px solid var(--border2);z-index:9999;
  animation:tin .18s ease,tout .3s ease 2.1s forwards;white-space:nowrap;pointer-events:none}
.te{border-color:rgba(248,113,113,.4);color:var(--red)}
.ts{border-color:rgba(45,212,191,.4);color:var(--green)}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(8px)}}
@keyframes tout{to{opacity:0;transform:translateX(-50%) translateY(8px)}}
.err{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);
  color:var(--red);padding:11px 14px;border-radius:10px;font-size:13px;margin:0 14px}
.empty{text-align:center;color:var(--text3);font-size:14px;padding:52px 20px;line-height:2.2}
.center{display:flex;align-items:center;justify-content:center}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
code{font-family:var(--mono);color:var(--accent-h);font-size:12px}
.search-bar{padding:8px 14px 2px;position:sticky;top:57px;background:rgba(4,4,9,.92);backdrop-filter:blur(12px);z-index:19}
.search-bar input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:9px 14px 9px 36px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;transition:border-color .15s}
.search-bar input:focus{border-color:var(--accent)}
.search-wrap{position:relative}
.search-wrap::before{content:'🔍';position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;line-height:1;padding:2px}

</head>
<body>
<div id="app"></div>
<script type="module">
import { initializeApp }    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, get, child }
                            from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const p1="AIzaSyAyVVDf3",p2="4Nsq4vJ7GFovADWQUi",p3="wAQIMbAo";
const fbApp=initializeApp({apiKey:p1+p2+p3,authDomain:"cipherchat-8d3dd.firebaseapp.com",
  databaseURL:"https://cipherchat-8d3dd-default-rtdb.firebaseio.com",projectId:"cipherchat-8d3dd",
  storageBucket:"cipherchat-8d3dd.firebasestorage.app",messagingSenderId:"373800191486",
  appId:"1:373800191486:web:8679aef24075ff9cb96caf"});
const db=getDatabase(fbApp);

async function vaultId(k){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(k));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('').slice(0,32);}
async function fbRead(k){const id=await vaultId(k);const s=await get(child(ref(db),`vaults/${id}/data`));return s.exists()?s.val():null;}
async function fbWrite(k,blob){const id=await vaultId(k);await set(ref(db,`vaults/${id}/data`),blob);}

const S={screen:'loading',vault:null,key:null,editId:null,editUserId:null,error:null,scanning:false,showP:{},filter:'Todos',genKey:null,setupTab:'new',setupImported:false,search:''};
const LI='nfcv3_init';
const BADGE_COLORS=[{bg:'rgba(91,94,247,.18)',color:'#a5a8ff'},{bg:'rgba(251,191,36,.15)',color:'#fbbf24'},{bg:'rgba(45,212,191,.15)',color:'#2dd4bf'},{bg:'rgba(248,113,113,.15)',color:'#f87171'},{bg:'rgba(167,139,250,.18)',color:'#c4b5fd'},{bg:'rgba(52,211,153,.15)',color:'#6ee7b7'}];
function badgeStyle(name){const u=S.vault?.users||[];const i=u.findIndex(x=>x.name===name);const c=BADGE_COLORS[(i<0?0:i)%BADGE_COLORS.length];return`background:${c.bg};color:${c.color}`;}

const h2b=h=>new Uint8Array(h.match(/.{2}/g).map(b=>parseInt(b,16)));
async function mkKey(){return Array.from(crypto.getRandomValues(new Uint8Array(32))).map(x=>x.toString(16).padStart(2,'0')).join('');}
async function enc(data,hex){const k=await crypto.subtle.importKey('raw',h2b(hex),'AES-GCM',false,['encrypt']);const iv=crypto.getRandomValues(new Uint8Array(12));const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},k,new TextEncoder().encode(JSON.stringify(data)));const o=new Uint8Array(12+ct.byteLength);o.set(iv);o.set(new Uint8Array(ct),12);return btoa(String.fromCharCode(...o));}
async function dec(b64,hex){const k=await crypto.subtle.importKey('raw',h2b(hex),'AES-GCM',false,['decrypt']);const b=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));const p=await crypto.subtle.decrypt({name:'AES-GCM',iv:b.slice(0,12)},k,b.slice(12));return JSON.parse(new TextDecoder().decode(p));}

// ================================================================
//  NFC AUTO-SCAN
//  startNFCScan() inicia leitura e chama callback com a chave lida.
//  Não precisa de botão — só chamar a função.
// ================================================================
let _nfcAbort = null;

async function startNFCScan(onKey){
  if(!('NDEFReader' in window)) return false;
  try{
    _nfcAbort = new AbortController();
    const reader = new NDEFReader();
    await reader.scan({ signal: _nfcAbort.signal });
    reader.addEventListener('reading', e=>{
      for(const rec of e.message.records){
        if(rec.recordType==='text'){
          onKey(new TextDecoder(rec.encoding||'utf-8').decode(rec.data).trim());
          return;
        }
      }
    }, { signal: _nfcAbort.signal });
    return true;
  }catch(e){
    return false;
  }
}

function stopNFCScan(){
  if(_nfcAbort){ _nfcAbort.abort(); _nfcAbort=null; }
  S.scanning=false;
}

async function initAutoUnlock(){
  if(!('NDEFReader' in window)) return;
  S.scanning=true; render();
  const ok = await startNFCScan(async key=>{
    stopNFCScan();
    try{
      await unlock(key);
      localStorage.setItem(LI,'1');
      S.screen='vault'; render();
      toast('Vault desbloqueado ✓','s');
    }catch(err){
      S.error=err.message; S.scanning=false; render();
    }
  });
  if(!ok){ S.scanning=false; render(); }
}

async function persist(){await fbWrite(S.key, await enc(S.vault,S.key));}
async function unlock(hex){const blob=await fbRead(hex);if(!blob)throw new Error('Vault não encontrado na nuvem.');S.vault=await dec(blob,hex);if(!S.vault.users)S.vault.users=[];S.key=hex;}
const uid=()=>typeof crypto.randomUUID==='function'?crypto.randomUUID():Date.now().toString(36)+Math.random().toString(36).slice(2);
function addE(e){S.vault.entries.push({...e,id:uid(),ts:Date.now()});}
function updE(id,e){const i=S.vault.entries.findIndex(x=>x.id===id);if(i>=0)S.vault.entries[i]={...S.vault.entries[i],...e};}
function delE(id){S.vault.entries=S.vault.entries.filter(e=>e.id!==id);}

function clip(t){navigator.clipboard?.writeText(t).catch(()=>{const a=Object.assign(document.createElement('textarea'),{value:t});document.body.appendChild(a);a.select();document.execCommand('copy');a.remove();});}
function toast(msg,type='s'){document.querySelectorAll('.toast').forEach(x=>x.remove());const el=document.createElement('div');el.className=`toast t${type}`;el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el?.remove(),2600);}
function genPwd(n=16){const c='ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789!@#$%&*';const a=new Uint8Array(n);crypto.getRandomValues(a);return Array.from(a).map(b=>c[b%c.length]).join('');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function init(){
  S.screen=localStorage.getItem(LI)?'locked':'setup';
  render();
  // inicia NFC automaticamente ao abrir na tela de bloqueio
  if(S.screen==='locked') initAutoUnlock();
}

function render(){
  document.getElementById('app').innerHTML={loading:rLoad,setup:rSetup,locked:rLocked,vault:rVault,add:rAdd,export:rExport,users:rUsers,tgconfig:rTgConfig}[S.screen]?.()??rLoad();
  bind();
}

function rLoad(){return`<div class="screen center"><div class="spinner"></div></div>`;}

function rSetup(){
  const nfc='NDEFReader' in window;
  return`<div class="screen">
  <div class="hdr"><span class="hdr-icon">🔐</span><div class="hdr-title">NFC Vault</div><div class="hdr-sub">Configuração inicial</div></div>
  <div style="padding:0 14px;margin-bottom:4px">
    <div class="btn-row">
      <button class="btn btn-p" id="btn-tab-new" style="${!S.setupTab||S.setupTab==='new'?'':'background:var(--bg3);box-shadow:none;color:var(--text2)'}">🆕 Novo Vault</button>
      <button class="btn btn-p" id="btn-tab-imp" style="${S.setupTab==='imp'?'':'background:var(--bg3);box-shadow:none;color:var(--text2)'}">📥 Acessar meu Vault</button>
    </div>
  </div>
  ${(!S.setupTab||S.setupTab==='new')?`
  <div class="steps">
    <div class="step"><div class="step-n">1</div><div>Gere a <strong>chave de segurança</strong> abaixo</div></div>
    <div class="step"><div class="step-n">2</div><div>Grave a chave na sua tag NFC via celular</div></div>
    <div class="step"><div class="step-n">3</div><div>Clique em <strong>"Criar Vault"</strong></div></div>
  </div>
  <div style="padding:6px 14px 0"><button class="btn btn-o" id="btn-gen">⚡ Gerar chave aleatória</button></div>
  <div id="ksec" style="${S.genKey?'':'display:none'};padding:0 14px;margin-top:2px">
    <div class="key-box">${S.genKey||''}</div>
    <div class="btn-row"><button class="btn btn-o" id="btn-cpk">📋 Copiar chave</button></div>
    <button class="btn btn-g" id="btn-crt" style="margin-top:14px">✓ Já gravei na tag — Criar Vault</button>
  </div>`:`
  <div style="padding:0 14px">
    ${nfc?`
    <div class="card nfc-card" style="margin:0 0 10px">
      <span class="nfc-ico${S.scanning?' pulse':''}">📡</span>
      <p style="margin:6px 0 10px;font-size:13px">${S.scanning?`<strong style="color:var(--accent-h)">Aproxime a tag NFC…</strong>`:'Aproxime a tag para desbloquear automaticamente'}</p>
      ${!S.scanning?`<button class="btn btn-p" id="btn-nfc-setup" style="margin-top:0">📡 Ativar leitura NFC</button>`:''}
    </div>
    <div class="div-or">ou inserir chave manualmente</div>`:''}
    <div class="card" style="margin:0 0 10px">
      <h3 style="margin-bottom:10px">🔑 Acesso pela Nuvem</h3>
      <div class="ig"><input type="text" id="inp-k-setup" class="mono-in" placeholder="Cole sua chave de 64 caracteres aqui..." autocomplete="off" spellcheck="false" style="font-size:12px"></div>
      <button class="btn btn-g" id="btn-cloud-setup">🔑 Entrar com Chave</button>
    </div>
    <div class="div-or">ou usar arquivo</div>
    <div class="card" style="margin:0 0 10px">
      <p style="font-size:12px;color:var(--text2);margin-bottom:10px">Se você tem um backup <code>.nfcv</code>:</p>
      <input type="file" id="f-im-setup" accept=".nfcv,.txt" style="display:none">
      <button class="btn btn-o" id="btn-im-setup">📂 Selecionar arquivo .nfcv</button>
      ${S.setupImported?`<div style="margin-top:12px"><p style="color:var(--green);font-size:13px;margin-bottom:8px">✓ Arquivo carregado! Cole a chave:</p><div class="ig"><input type="text" id="inp-k-file-setup" class="mono-in" placeholder="Chave do arquivo..." style="font-size:12px"></div><button class="btn btn-g" id="btn-mk-file-setup" style="margin-top:6px">🔓 Abrir arquivo</button></div>`:''}
    </div>
  </div>`}
  ${S.error?`<div class="err" style="margin-top:10px">${S.error}</div>`:''}
</div>`;}

function rLocked(){
  const nfc='NDEFReader' in window;
  return`<div class="screen">
  <div class="hdr"><span class="hdr-icon">🔐</span><div class="hdr-title">NFC Vault</div>
    <div class="hdr-sub">${S.scanning?'Aproxime a tag NFC…':'Vault bloqueado'}</div></div>
  ${nfc?`
  <div class="card nfc-card">
    <span class="nfc-ico${S.scanning?' pulse':''}">📡</span>
    <p style="margin:6px 0 14px;font-size:13px">${S.scanning?`<strong style="color:var(--accent-h)">Pronto! Aproxime a tag NFC…</strong>`:'Toque para ativar leitura NFC'}</p>
    ${!S.scanning?`<button class="btn btn-p" id="btn-nfc">📡 Usar tag NFC</button>`:''}
  </div>
  <div class="div-or">ou inserir chave</div>`:`<div class="card"><p>Web NFC disponível apenas no <strong>Chrome para Android</strong>.</p></div>`}
  <div class="card">
    <div class="ig"><input type="text" id="inp-k" class="mono-in" placeholder="Cole sua chave aqui…" autocomplete="off" spellcheck="false" style="font-size:12px"></div>
    <button class="btn btn-o" id="btn-mk">🔑 Desbloquear</button>
  </div>
  ${S.error?`<div class="err">${S.error}</div>`:''}
  <div style="text-align:center;padding:14px">
    <button class="btn-txt" id="btn-rst">Reconfigurar vault (Sair)</button>
  </div>
</div>`;}

function rVault(){
  const users=S.vault.users||[];
  const q=(S.search||'').toLowerCase().trim();
  let list=S.filter==='Todos'?S.vault.entries:S.vault.entries.filter(e=>e.owner===S.filter);
  if(q) list=list.filter(e=>(e.label||'').toLowerCase().includes(q)||(e.username||'').toLowerCase().includes(q)||(e.url||'').toLowerCase().includes(q));
  const cards=list.length===0?`<div class="empty">${q?`Nenhum resultado para "<strong>${esc(q)}</strong>"`:'Nenhuma senha aqui.<br>Toque <strong style="color:var(--accent-h)">+</strong> para adicionar.'}</div>`:list.map(e=>{const shown=S.showP[e.id];return`<div class="ecard" data-id="${e.id}"><div class="ehdr"><div class="elabel">${esc(e.label)}</div><div class="ebadge" style="${badgeStyle(e.owner)}">${esc(e.owner)}</div></div>${e.username?`<div class="euser">${esc(e.username)}</div>`:'<div style="height:4px"></div>'}<div class="epwdr"><span class="epwd">${shown?esc(e.password):'• • • • • • • •'}</span><div class="eacts"><button class="ibtn-sm bey" data-id="${e.id}">${shown?'🙈':'👁️'}</button><button class="ibtn-sm bcp" data-pw="${esc(e.password)}">📋</button><button class="ibtn-sm bdl" data-id="${e.id}">🗑️</button></div></div></div>`;}).join('');
  return`<div class="screen"><div class="tbar"><div class="tbar-side"><button class="ibtn" id="btn-usr">👥</button></div><div class="tbar-title">🔐 Vault</div><div class="tbar-side"><button class="ibtn" id="btn-exp">⬇️</button><button class="ibtn" id="btn-lk">🔒</button></div></div>
<div class="search-bar"><div class="search-wrap"><input type="search" id="srch" placeholder="Pesquisar senha…" value="${esc(S.search)}" autocomplete="off" spellcheck="false">${q?`<button class="search-clear" id="btn-srch-clear">✕</button>`:''}</div></div>
<div class="tabs">${['Todos',...users.map(u=>u.name)].map(o=>`<button class="tab${S.filter===o?' on':''}" data-f="${esc(o)}">${esc(o)}</button>`).join('')}</div><div class="elist">${cards}</div><button class="fab" id="btn-add">+</button></div>`;}

function rAdd(){
  const isEd=!!S.editId,e=isEd?S.vault.entries.find(x=>x.id===S.editId)||{}:{};
  return`<div class="screen"><div class="tbar"><div class="tbar-side"><button class="ibtn" id="btn-bk">←</button></div><div class="tbar-title">${isEd?'Editar senha':'Nova senha'}</div><div class="tbar-side"></div></div><div class="fbody"><div class="ig"><label>Nome / Serviço *</label><input type="text" id="f-lb" placeholder="Gmail, Banco, Netflix…" value="${esc(e.label||'')}"></div><div class="ig"><label>Usuário / E-mail</label><input type="text" id="f-us" placeholder="usuario@email.com" value="${esc(e.username||'')}" autocomplete="off"></div><div class="ig"><label>Senha *</label><div class="pwd-row"><input type="${S.showP.form?'text':'password'}" id="f-pw" placeholder="Senha" value="${esc(e.password||'')}" autocomplete="new-password" class="mono-in"><button class="ibtn-sm bey" data-id="form">${S.showP.form?'🙈':'👁️'}</button><button class="ibtn" id="btn-gpw" style="font-size:15px">🎲</button></div></div><div class="ig"><label>Dono</label><select id="f-ow">${(S.vault.users||[]).length===0?`<option value="">— cadastre usuários primeiro —</option>`:(S.vault.users).map(u=>`<option value="${esc(u.name)}"${(e.owner||'')===u.name?' selected':''}>${esc(u.name)}</option>`).join('')}</select></div><div class="ig"><label>Notas</label><textarea id="f-nt" placeholder="Observações opcionais…">${esc(e.notes||'')}</textarea></div><button class="btn btn-p" id="btn-sv">${isEd?'✓ Salvar alterações':'+ Adicionar senha'}</button>${isEd?`<button class="btn btn-r" id="btn-de" style="margin-top:10px">🗑️ Excluir esta senha</button>`:''}</div></div>`;}

function rUsers(){
  const users=S.vault.users||[],isEd=!!S.editUserId,eu=isEd?users.find(x=>x.id===S.editUserId)||{}:{};
  const ulist=users.length===0?`<div class="empty">Nenhum usuário cadastrado.</div>`:users.map(u=>`<div class="ecard" style="display:flex;align-items:center;gap:12px;cursor:default"><div class="ebadge" style="${badgeStyle(u.name)};padding:6px 12px;font-size:13px;font-weight:700;border-radius:10px">${esc(u.name.charAt(0).toUpperCase())}</div><div style="flex:1;font-size:15px;font-weight:600">${esc(u.name)}</div><button class="ibtn-sm bedu" data-uid="${u.id}">✏️</button><button class="ibtn-sm bdlu" data-uid="${u.id}">🗑️</button></div>`).join('');
  return`<div class="screen"><div class="tbar"><div class="tbar-side"><button class="ibtn" id="btn-bk">←</button></div><div class="tbar-title">👥 Usuários</div><div class="tbar-side"></div></div><div style="padding:10px 14px 0">${ulist}</div><div class="card" style="margin-top:8px"><h3 style="margin-bottom:12px">${isEd?'✏️ Editar usuário':'+ Novo usuário'}</h3><div class="ig"><input type="text" id="f-un" placeholder="Ex: Matheus, Principal…" value="${esc(eu.name||'')}" maxlength="30"></div><button class="btn btn-p" id="btn-svu" style="margin-top:6px">${isEd?'✓ Salvar':'+ Adicionar usuário'}</button>${isEd?`<button class="btn btn-o" id="btn-cncu" style="margin-top:4px">Cancelar</button>`:''}</div></div>`;}

function rExport(){
  const tg=S.vault?.telegram||{};
  return`<div class="screen"><div class="tbar"><div class="tbar-side"><button class="ibtn" id="btn-bk">←</button></div><div class="tbar-title">Backup & Sync</div><div class="tbar-side"></div></div><div style="padding:6px 0"><div class="card"><h3>☁️ Nuvem Ativa</h3><p>O vault está sincronizado via Firebase. Suas alterações são salvas automaticamente.</p></div><div class="card"><h3>📤 Exportar arquivo</h3><button class="btn btn-p" id="btn-dl">⬇️ Baixar vault.nfcv</button></div><div class="card"><h3>✈️ Telegram Backup</h3><p style="margin-bottom:10px">${tg.token&&tg.chatId?'Bot configurado.':'Configure o bot para habilitar.'}</p>${tg.token&&tg.chatId?`<button class="btn btn-g" id="btn-tg">📨 Enviar para Telegram</button><button class="btn-txt" id="btn-tg-cfg">⚙️ Reconfigurar bot</button>`:`<button class="btn btn-o" id="btn-tg-cfg">⚙️ Configurar bot Telegram</button>`}</div><div class="card"><h3>🔑 Chave Atual</h3><div class="key-box sm">${S.key}</div><button class="btn btn-o" id="btn-ck">📋 Copiar minha chave</button></div></div></div>`;}

function rTgConfig(){
  const tg=S.vault?.telegram||{};
  return`<div class="screen"><div class="tbar"><div class="tbar-side"><button class="ibtn" id="btn-bk">←</button></div><div class="tbar-title">✈️ Telegram Bot</div><div class="tbar-side"></div></div><div style="padding:14px"><div class="ig" style="margin-bottom:12px"><label>Token do Bot</label><input type="text" id="tg-token" class="mono-in" placeholder="1234567890:AAHxxx…" value="${esc(tg.token||'')}"></div><div class="ig" style="margin-bottom:14px"><label>Chat ID</label><input type="text" id="tg-chatid" class="mono-in" placeholder="986603726" value="${esc(tg.chatId||'')}"></div><button class="btn btn-p" id="btn-tg-save">✓ Salvar configuração</button>${S.error?`<div class="err" style="margin-top:10px">${S.error}</div>`:''}</div></div>`;}

async function sendTelegram(token,chatId,blob){const date=new Date().toISOString().slice(0,10);const fd=new FormData();fd.append('chat_id',chatId);fd.append('caption',`🔐 NFC Vault — backup ${date}`);fd.append('document',new File([blob],`vault_${date}.nfcv`,{type:'text/plain'}));const r=await fetch(`https://api.telegram.org/bot${token}/sendDocument`,{method:'POST',body:fd});const j=await r.json();if(!j.ok)throw new Error(j.description||'Erro ao enviar');}

function bind(){
  const $=id=>document.getElementById(id);
  const on=(id,fn)=>$(id)?.addEventListener('click',fn);

  document.querySelectorAll('[data-f]').forEach(b=>b.addEventListener('click',()=>{S.filter=b.dataset.f;render();}));

  document.querySelectorAll('.bey').forEach(b=>b.addEventListener('click',()=>{
    if(b.dataset.id==='form'){const inp=$('f-pw');if(!inp)return;const showing=inp.type==='text';inp.type=showing?'password':'text';b.textContent=showing?'👁️':'🙈';S.showP.form=!showing;}
    else{S.showP[b.dataset.id]=!S.showP[b.dataset.id];render();}
  }));

  document.querySelectorAll('.bcp').forEach(b=>b.addEventListener('click',()=>{clip(b.dataset.pw);toast('Senha copiada!','s');}));
  document.querySelectorAll('.bdl').forEach(b=>b.addEventListener('click',async e=>{e.stopPropagation();if(!confirm('Excluir esta senha?'))return;delE(b.dataset.id);await persist();toast('Senha removida','s');render();}));
  document.querySelectorAll('.ecard').forEach(c=>c.addEventListener('click',e=>{if(e.target.closest('.eacts'))return;S.editId=c.dataset.id;S.screen='add';render();}));

  // SETUP
  on('btn-tab-new',()=>{S.setupTab='new';S.setupImported=false;S.error=null;stopNFCScan();render();});
  on('btn-tab-imp',()=>{S.setupTab='imp';S.error=null;render();initAutoUnlock();});
  on('btn-gen',async()=>{S.genKey=await mkKey();render();});
  on('btn-cpk',()=>{clip(S.genKey);toast('Chave copiada!','s');});
  on('btn-crt',async()=>{if(!S.genKey)return;S.vault={entries:[],users:[]};S.key=S.genKey;await persist();localStorage.setItem(LI,'1');S.screen='vault';S.genKey=null;render();toast('Vault criado na nuvem! 🎉','s');});

  // NFC manual no setup
  on('btn-nfc-setup',async()=>{S.scanning=true;S.error=null;render();await initAutoUnlock();});

  on('btn-cloud-setup',async()=>{
    const k=($('inp-k-setup')?.value||'').trim();
    if(k.length!==64){S.error='A chave deve ter 64 caracteres hex.';render();return;}
    try{S.error=null;await unlock(k);localStorage.setItem(LI,'1');S.screen='vault';render();toast('Vault carregado ✓','s');}
    catch(err){S.error=err.message;render();}
  });

  on('btn-im-setup',()=>$('f-im-setup')?.click());
  $('f-im-setup')?.addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{S._importBlob=ev.target.result.trim();S.setupImported=true;S.error=null;render();};r.readAsText(f);});
  on('btn-mk-file-setup',async()=>{const k=($('inp-k-file-setup')?.value||'').trim();if(k.length!==64){S.error='Chave incorreta.';render();return;}try{S.vault=await dec(S._importBlob,k);S.key=k;await persist();localStorage.setItem(LI,'1');S.screen='vault';render();toast('Backup importado!','s');}catch{S.error='Chave incorreta para este arquivo.';render();}});

  // LOCKED
  on('btn-nfc',async()=>{S.scanning=true;S.error=null;render();await initAutoUnlock();});
  on('btn-mk',async()=>{const k=($('inp-k')?.value||'').trim();if(k.length!==64){S.error='Chave inválida.';render();return;}try{stopNFCScan();await unlock(k);S.error=null;S.screen='vault';render();toast('Desbloqueado ✓','s');}catch{S.error='Chave incorreta ou sem internet.';render();}});
  on('btn-rst',()=>{if(confirm('Sair? Os dados na nuvem continuam seguros.')){stopNFCScan();localStorage.removeItem(LI);S.screen='setup';S.error=null;render();}});

  // VAULT
  on('btn-add',()=>{S.editId=null;S.screen='add';render();});
  on('btn-lk',()=>{stopNFCScan();S.vault=null;S.key=null;S.search='';S.screen='locked';render();initAutoUnlock();});
  on('btn-exp',()=>{S.screen='export';render();});
  on('btn-usr',()=>{S.editUserId=null;S.screen='users';render();});
  on('btn-srch-clear',()=>{S.search='';render();});
  document.getElementById('srch')?.addEventListener('input',e=>{S.search=e.target.value;render();});

  // USERS
  document.querySelectorAll('.bedu').forEach(b=>b.addEventListener('click',()=>{S.editUserId=b.dataset.uid;render();}));
  document.querySelectorAll('.bdlu').forEach(b=>b.addEventListener('click',async()=>{const u=S.vault.users.find(x=>x.id===b.dataset.uid);if(!u||!confirm(`Remover "${u.name}"?`))return;S.vault.users=S.vault.users.filter(x=>x.id!==b.dataset.uid);await persist();render();}));
  on('btn-svu',async()=>{const name=(document.getElementById('f-un')?.value||'').trim();if(!name)return;const users=S.vault.users||[];if(S.editUserId){const i=users.findIndex(x=>x.id===S.editUserId);if(i>=0)users[i].name=name;S.editUserId=null;}else{if(!S.vault.users)S.vault.users=[];S.vault.users.push({id:uid(),name});}await persist();render();});
  on('btn-cncu',()=>{S.editUserId=null;render();});

  // ADD/EDIT
  on('btn-bk',()=>{S.editId=null;S.editUserId=null;S.showP.form=false;S.screen=S.vault?'vault':'locked';render();});
  on('btn-gpw',()=>{const pw=genPwd();const inp=$('f-pw');if(inp){inp.value=pw;inp.type='text';S.showP.form=true;const eye=document.querySelector('.bey[data-id="form"]');if(eye)eye.textContent='🙈';}toast('Senha gerada!','s');});
  on('btn-sv',async()=>{const lb=($('f-lb')?.value||'').trim(),pw=($('f-pw')?.value||'').trim();if(!lb||!pw){toast('Preencha os campos obrigatórios','e');return;}const entry={label:lb,username:($('f-us')?.value||'').trim(),password:pw,url:($('f-ur')?.value||'').trim(),owner:$('f-ow')?.value||(S.vault.users[0]?.name||''),notes:($('f-nt')?.value||'').trim()};if(!!S.editId)updE(S.editId,entry);else addE(entry);await persist();S.editId=null;S.screen='vault';render();toast(!!S.editId?'Senha atualizada ✓':'Senha adicionada 🎉','s');});
  on('btn-de',async()=>{if(!confirm('Excluir permanentemente?'))return;delE(S.editId);await persist();S.editId=null;S.screen='vault';render();});

  // EXPORT
  on('btn-dl',async()=>{const blob=await enc(S.vault,S.key);const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([blob],{type:'text/plain'}));a.download=`vault_${new Date().toISOString().slice(0,10)}.nfcv`;a.click();});
  on('btn-tg-cfg',()=>{S.error=null;S.screen='tgconfig';render();});
  on('btn-tg',async()=>{const tg=S.vault?.telegram||{};try{const blob=await enc(S.vault,S.key);await sendTelegram(tg.token,tg.chatId,blob);toast('Enviado para o Telegram ✓','s');}catch(e){toast('Erro: '+e.message,'e');}});
  on('btn-ck',()=>{clip(S.key);toast('Chave copiada!','s');});
  on('btn-tg-save',async()=>{const token=($('tg-token')?.value||'').trim(),chatId=($('tg-chatid')?.value||'').trim();if(!token||!chatId)return;S.vault.telegram={token,chatId};await persist();S.screen='export';render();});
}

init();
</script>
</body>
</html>
